name: Release

# Semantic release from Angular commits on main.
# Requires PyPI Trusted Publishing (OIDC) configured for this repo — no token stored.
on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write        # tag + changelog commit
  id-token: write        # PyPI trusted publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'wbenbihi'   # guard against fork runs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Semantic release (version, changelog, tag, build)
        id: release
        run: |
          before="$(git rev-parse HEAD)"
          uv run semantic-release version
          after="$(git rev-parse HEAD)"
          # semantic-release only commits a version bump when it actually releases,
          # so a changed HEAD (and a populated dist/) means a release was cut.
          if [ "$before" != "$after" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No releasable commits since the last tag — skipping publish."
          fi

      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
