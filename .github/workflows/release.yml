name: Release

# Semantic release from Angular commits on main.
# Requires PyPI Trusted Publishing (OIDC) configured for this repo — no token stored.
on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write        # tag + changelog commit
  id-token: write        # PyPI trusted publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'wbenbihi'   # guard against fork runs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Semantic release (version, changelog, tag, build)
        run: uv run semantic-release version

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
