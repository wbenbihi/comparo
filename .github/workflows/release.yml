name: Release

# Semantic release from Conventional Commits on the release branches (main =
# stable 0.x; alpha/beta/rc = prereleases), via the official python-semantic-release
# action. Version commits + tags push via RELEASE_TOKEN so they reach protected
# branches (the token's owner is a repo admin and admins bypass protection); the
# PyPI upload uses Trusted Publishing (OIDC), so no publish token is stored.
# workflow_dispatch allows a controlled manual release on a chosen branch.
on:
  push:
    branches: [main, alpha, beta, rc]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write        # tag + changelog commit
  id-token: write        # PyPI trusted publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    # Guard against fork runs, and skip semantic-release's own version-bump push:
    # a PAT-authenticated push re-fires this workflow (unlike the default token),
    # so without this the release would loop. head_commit is null on a manual
    # dispatch, so the guard is a no-op there and the release still runs.
    if: >-
      github.repository_owner == 'wbenbihi' &&
      !contains(github.event.head_commit.message, 'Automatically generated by python-semantic-release')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          # Owner PAT so the release can push the version commit + tag to a
          # protected release branch (admin bypass) and authenticate the API.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9.21.2
        with:
          # The official action wires this token into BOTH git (push commit/tag)
          # and the GitHub API (create the release) — fixing the 401 the
          # hand-rolled step hit — and as the admin owner it bypasses branch
          # protection on the release branches.
          github_token: ${{ secrets.RELEASE_TOKEN }}
          git_committer_name: github-actions
          git_committer_email: actions@users.noreply.github.com

      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
