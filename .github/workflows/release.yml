name: Release

# Semantic release from Conventional Commits on the release branches (main =
# stable 0.x; alpha/beta/rc = prereleases). Version commits + tags push via
# RELEASE_TOKEN so they reach protected branches (the token's owner is a repo
# admin and admins bypass protection); the PyPI upload uses Trusted Publishing
# (OIDC), so no publish token is stored. workflow_dispatch allows a controlled
# manual release on a chosen branch.
on:
  push:
    branches: [main, alpha, beta, rc]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write        # tag + changelog commit
  id-token: write        # PyPI trusted publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    # Guard against fork runs, and skip semantic-release's own version-bump push:
    # a PAT-authenticated push re-fires this workflow (unlike the default token),
    # so without this the release would loop. head_commit is null on a manual
    # dispatch, so the guard is a no-op there and the release still runs.
    if: >-
      github.repository_owner == 'wbenbihi' &&
      !contains(github.event.head_commit.message, 'Automatically generated by python-semantic-release')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Owner PAT so semantic-release can push the version commit + tag to a
          # protected release branch (admin bypass); default token elsewhere.
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Semantic release (version, changelog, tag, build)
        id: release
        run: |
          before="$(git rev-parse HEAD)"
          uv run semantic-release version
          after="$(git rev-parse HEAD)"
          # semantic-release only commits a version bump when it actually releases,
          # so a changed HEAD (and a populated dist/) means a release was cut.
          if [ "$before" != "$after" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No releasable commits since the last tag — skipping publish."
          fi

      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
