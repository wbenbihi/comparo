# Install with: uv run pre-commit install --hook-type pre-commit --hook-type commit-msg
minimum_pre_commit_version: "3.5.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit   # enforce Angular commit messages
        stages: [commit-msg]

  # Local hooks run through uv so pre-commit and CI use the SAME locked tool
  # versions, and mypy/import-linter see the project's real dependencies.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint)
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: mypy
        name: mypy (strict)
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
      - id: import-linter
        name: import-linter (architecture contract)
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        always_run: true
