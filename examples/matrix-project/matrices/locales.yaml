apiVersion: comparo/v1
kind: Matrix
metadata:
  name: Locales
  id: matrix.locales
  description: Three locales, merged into the query string.
spec:
  target: request.query
  mode: merge
  values:
    - locale: en-US
      currency: USD
    - locale: fr-FR
      currency: EUR
    - locale: ja-JP
      currency: JPY
