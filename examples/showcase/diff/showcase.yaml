apiVersion: comparo/v1
kind: DiffProfile
metadata:
  name: Showcase
  id: diff.showcase
  description: >-
    Exact by default; volatile metadata ignored; a tolerance band on the total;
    one deliberately unused rule so the "unused" section has a face.
spec:
  default: exact
  rules:
    - path: $.meta.requestId
      mode: ignore          # a fresh uuid per response
    - path: $.meta.generatedAt
      mode: ignore          # a timestamp per response
    - path: $.quote.total
      mode: tolerance       # float rounding across replicas is not a regression
      tolerance: 0.01
    - path: $[*].ts
      mode: ignore          # per-event timestamps in the feed stream
    - path: $headers.server
      mode: ignore          # the two showcase servers name themselves differently
    - path: $.tpyo.field
      mode: ignore          # deliberately matches nothing → the "unused" section
