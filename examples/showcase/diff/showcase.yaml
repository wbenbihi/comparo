apiVersion: comparo/v1
kind: DiffProfile
metadata:
  name: Showcase
  id: diff.showcase
  description: >-
    The project default: exact everywhere, with one rule per silencing story —
    a tolerance band that absorbs (/rounding) and one that breaks (/fees), a
    deliberately-volatile body field ignored, a user-written header silence on
    a real per-side drift, and one rule that matches nothing so the "unused"
    section has a face.
spec:
  default: exact
  rules:
    # ABSORBED on /rounding: 240.0 vs 240.004 stays inside the band → SAME.
    - path: $.totals.rounded
      mode: tolerance
      tolerance: 0.01
    # BROKEN on /fees: 12.5 vs 14.0 blows through the same-sized band → DRIFT.
    - path: $.totals.fee
      mode: tolerance
      tolerance: 0.01
    # /quote's nonce differs on every call — volatile by design, silenced here.
    - path: $.meta.nonce
      mode: ignore
    # Every response carries a per-SIDE x-build-id; this user rule silences a
    # drift that would otherwise light up every cell (the built-ins already
    # silence date, x-request-id, content-length, and friends).
    - path: $headers.x-build-id
      mode: ignore
    # Deliberately matches nothing anywhere — the rules index flags it unused.
    - path: $.tpyo.field
      mode: ignore
