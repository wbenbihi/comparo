apiVersion: comparo/v1
kind: AssertionProfile
metadata:
  name: Order contract
  id: assert.order
  description: >-
    Checkout's profile, composing assert.base via `include`. One rule is
    deliberately wrong — total == 999 against the echoed 240.0 — so the run
    always shows a ✗ FAIL cell with expected · got and a red anchor pinned at
    $.order.total in the evidence tree. The sku and header rules hold (green
    anchors), and the x-request-id warn holds too — a `~ · held` line.
spec:
  include:
    - $use: assert.base
  rules:
    # The deterministic FAIL: serve.py echoes the posted total, 240.0.
    - target: body:$.order.total
      op: equals
      value: 999
    - target: body:$.order.sku
      op: equals
      value: WIDGET-1
    # The header-target assertion: serve.py sends x-service-tier: gold.
    - target: header:x-service-tier
      op: equals
      value: gold
    # A warn advisory that HELD — every showcase response carries the header.
    - target: header:x-request-id
      op: exists
      severity: warn
