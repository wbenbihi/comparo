apiVersion: comparo/v1
kind: Project
metadata:
  name: results-showcase
  description: >-
    Every state of the Diff AND Run results against public services
    (httpbin.org, sse.dev) — no local server needed.
spec:
  data: .
  environments:
    default: baseline
    diffPairs:
      - name: baseline-vs-candidate
        baseline: baseline
        candidate: candidate
  run:
    concurrency: 4
    retry:
      attempts: 2
      backoff: constant
  diff:
    default:
      $ref: diff.showcase
