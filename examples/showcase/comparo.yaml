apiVersion: comparo/v1
kind: Project
metadata:
  name: results-showcase
  description: >-
    Every state of the Diff, Run, and Execution results screens, produced
    deterministically by two local servers (python examples/showcase/serve.py,
    ports 8091/8092). The README maps each state to the request that shows it.
spec:
  data: .
  environments:
    default: baseline
    diffPairs:
      - name: baseline-vs-candidate
        baseline: baseline
        candidate: candidate
  run:
    concurrency: 4
    retry:
      attempts: 2
      backoff: constant
  diff:
    default:
      $use: diff.showcase
  redaction:
    # Mask anything equal to a declared secret value, even if it arrives untainted.
    stringMatchBackstop: true
