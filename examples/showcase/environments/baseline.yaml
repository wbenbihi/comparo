apiVersion: comparo/v1
kind: Environment
metadata:
  name: baseline
  id: environment.baseline
  description: httpbin.org with the stable configuration.
spec:
  baseUrl: https://httpbin.org
  timeout:
    connect: 5s
    read: 15s
  variables:
    TAX_RATE: "0.20"
    API_VERSION: 2024-08
    STATUS: "200"
    DELAY: "0"
