apiVersion: comparo/v1
kind: Environment
metadata:
  name: candidate
  id: environment.candidate
  description: >-
    The same httpbin.org, configured like a misdeployed canary: a bumped tax
    rate, a new API version header, a 503 status, and a 10s delay.
spec:
  baseUrl: https://httpbin.org
  timeout:
    connect: 5s
    read: 15s
  variables:
    TAX_RATE: "0.25"
    API_VERSION: 2025-01
    STATUS: "503"
    DELAY: "10"
