apiVersion: comparo/v1
kind: Environment
metadata:
  name: candidate
  id: environment.candidate
  description: >-
    The release under test — serve.py's :8092 side, deliberately misbehaving:
    drifted values, a 503, a truncated response, a slow lane, and a bumped
    TAX_RATE in its own configuration.
spec:
  baseUrl: http://127.0.0.1:8092
  timeout:
    connect: 2s
    read: 5s
  secrets:
    SHOWCASE_TOKEN:
      $from:
        - $env: COMPARO_SHOWCASE_TOKEN
        - $literal: shhh-showcase-secret
  variables:
    TAX_RATE: "0.25"
  health:
    - method: GET
      endpoint: /health
