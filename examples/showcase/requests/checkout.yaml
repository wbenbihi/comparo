apiVersion: comparo/v1
kind: Request
metadata:
  name: Checkout
  id: request.checkout
  description: >-
    POST a fixed order to /checkout, which echoes it back. assert.order (which
    composes assert.base) demands $.order.total == 999 against the echoed
    240.0, so the RUN cell FAILS deterministically with expected 999 · got
    240.0 and a red anchor at $.order.total; the header rule x-service-tier ==
    gold holds, and x-request-id (warn) holds. The order is identical on both
    sides, so the DIFF cell is clean.
  tags:
    - pricing
spec:
  request:
    method: POST
    endpoint: /checkout
    body:
      order:
        sku: WIDGET-1
        quantity: 3
        total: 240.0
  response:
    status: 200
    assert:
      $ref: assert.order
