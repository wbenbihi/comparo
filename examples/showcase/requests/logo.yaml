apiVersion: comparo/v1
kind: Request
metadata:
  name: Brand logo
  id: request.logo
  description: >-
    /logo returns an identical PNG on both sides — the binary view with NO
    drift: magic (%PNG), size, sha256 (stable across runs), a hex head. Never
    decoded to mojibake.
  tags:
    - payload
spec:
  request:
    method: GET
    endpoint: /logo
  response:
    status: 200
