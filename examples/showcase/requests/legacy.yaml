apiVersion: comparo/v1
kind: Request
metadata:
  name: Legacy quote
  id: request.legacy
  description: >-
    /delay/10 against a 1s read budget — times out on EVERY environment.
    The ! ERROR cell in both tabs: RUN shows the error card (verbatim error,
    attempts, retry policy) and its rules land in every record as
    `! error · never evaluated`; DIFF shows the error panel with the kept
    single-sided evidence.
  tags:
    - pricing
spec:
  timeout:
    read: 1s
  request:
    method: GET
    endpoint: /delay/10
  response:
    status: 200
