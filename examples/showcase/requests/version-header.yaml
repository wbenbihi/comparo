apiVersion: comparo/v1
kind: Request
metadata:
  name: Version header
  id: request.version-header
  description: >-
    /response-headers turns its query into RESPONSE HEADERS — so the two
    API_VERSION values drift in the headers well (and in the echoed body).
  tags:
    - pricing
spec:
  request:
    method: GET
    endpoint: /response-headers
    query:
      x-api-version: ${API_VERSION}
  response:
    status: 200
