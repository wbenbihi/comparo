apiVersion: comparo/v1
kind: Request
metadata:
  name: Status page
  id: request.html
  description: >-
    /page returns HTML. The candidate changes one paragraph ("All systems
    operational." → "Checkout is degraded."), so the DIFF shows the text drift
    and a RUN renders the document as an outline (title, headings, the table's
    shape), not tag soup. The raw facet has the verbatim bytes.
  tags:
    - payload
spec:
  request:
    method: GET
    endpoint: /page
  response:
    status: 200
