apiVersion: comparo/v1
kind: Request
metadata:
  name: Price feed
  id: request.feed
  description: >-
    /stream/5 is five chunked-JSON events; each echoes the injected taxRate, so
    $[N].args.taxRate drifts per event — the sequence view, never one blob.
  tags:
    - pricing
spec:
  request:
    method: GET
    endpoint: /stream/5
    query:
      taxRate: ${TAX_RATE}
  response:
    status: 200
    streaming: true
