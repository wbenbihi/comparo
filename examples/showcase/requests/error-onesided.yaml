apiVersion: comparo/v1
kind: Request
metadata:
  name: Legacy quote
  id: request.error-onesided
  description: >-
    /legacy answers normally on baseline but the candidate truncates its
    response mid-body and hangs up — an immediate transport error on ONE side.
    The DIFF cell is ! ERROR: no fake diff, the error panel names the failing
    side and keeps the baseline response single-sided; the RUN against the
    candidate shows the error card.
  tags:
    - errors
spec:
  request:
    method: GET
    endpoint: /legacy
  response:
    status: 200
