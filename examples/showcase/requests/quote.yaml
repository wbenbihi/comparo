apiVersion: comparo/v1
kind: Request
metadata:
  name: Price quote
  id: request.quote
  description: >-
    The flagship drift, ×3 plans via matrix.plans: the candidate bumps the
    price by 6.0 (number drift) and the taxRate from "0.20" to "0.25" (string
    drift) on every plan — one bug across three cells, collapsed to one row in
    the fields pivot. Its volatile $.meta.nonce is silenced by a diff rule.
  tags:
    - pricing
spec:
  matrix:
    - $use: matrix.plans
  request:
    method: GET
    endpoint: /quote
  response:
    status: 200
    # Inline assert block — rules whose provenance is this request, not a profile.
    assert:
      rules:
        - target: body:$.quote.plan
          op: exists
        - target: body:$.quote.currency
          op: equals
          value: USD
