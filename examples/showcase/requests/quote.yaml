apiVersion: comparo/v1
kind: Request
metadata:
  name: Price quote
  id: request.quote
  description: >-
    The flagship drift: each environment injects its own TAX_RATE into the
    query, httpbin echoes it back, and $.args.taxRate drifts on every plan —
    one bug across three cells. The outbound band says the drift is OURS.
  tags:
    - pricing
spec:
  matrix:
    - $ref: matrix.plans
  request:
    method: GET
    endpoint: /get
    query:
      taxRate: ${TAX_RATE}
  response:
    status: 200
    assert:
      rules:
        - target: body:$.args.plan
          op: exists
        - target: latency
          op: lte
          value: 5ms
          severity: warn    # the ~ advisory — breaks almost always, never gates
