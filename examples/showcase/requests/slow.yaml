apiVersion: comparo/v1
kind: Request
metadata:
  name: Slow endpoint
  id: request.slow
  description: >-
    /delay/${DELAY} — 0s on baseline, 10s on candidate against a 2s read
    budget: the candidate side times out. The transport-error cell.
  tags:
    - pricing
spec:
  timeout:
    read: 2s
  request:
    method: GET
    endpoint: /delay/${DELAY}
  response:
    status: 200
