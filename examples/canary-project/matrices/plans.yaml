apiVersion: comparo/v1
kind: Matrix
metadata:
  name: Plans
  id: matrix.plans
  description: >-
    Two plan tiers, merged into the query. The quote request runs once per plan,
    so the regressed field drifts on both cells — which the Diff screen collapses
    into a single grouped row.
spec:
  target: request.query
  mode: merge
  values:
    - plan: free
    - plan: pro
