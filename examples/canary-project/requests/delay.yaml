apiVersion: comparo/v1
kind: Request
metadata:
  name: Delay
  id: request.delay
  description: >-
    GET /delay/1 — responds after roughly one second. The body ({"delay":"1"}) is
    deterministic, so it compares SAME; only the latency differs, and latency is
    never diffed.
  tags:
    - utility
    - smoke
spec:
  request:
    method: GET
    endpoint: /delay/1
    headers:
      $val: instance.default-headers
  response:
    status: 200
