apiVersion: comparo/v1
kind: Request
metadata:
  name: Price quote
  id: request.quote
  description: >-
    Fetch a price quote per plan. taxRate is drawn from the environment, so
    Stable sends 0.20 and Canary sends 0.25 — the one field that drifts. currency
    and apiVersion are identical on both sides, so they compare SAME.
  tags:
    - pricing
    - smoke
spec:
  matrix:
    - $use: matrix.plans
  request:
    method: GET
    endpoint: /get
    query:
      currency: USD
      taxRate: ${TAX_RATE}
      apiVersion: ${API_VERSION}
    headers:
      $val: instance.default-headers
  response:
    status: 200
    schema:
      $use: schema.echo-get
    diff:
      $use: diff.echo-args
    # The pricing contract (which composes in HTTP OK) — evaluated on both envs.
    assert:
      $use: assert.pricing
