apiVersion: comparo/v1
kind: Request
metadata:
  name: Checkout
  id: request.checkout
  description: >-
    POST an order to /post. The body echoes back under `json`, where the diff
    profile compares sampleSize with a ± tolerance and tier by JSON type.
    sampleSize nudges 1000 → 1004 between environments but stays inside the ±5
    budget, so it compares SAME — tolerance absorbs acceptable numeric drift.
  tags:
    - pricing
    - smoke
spec:
  request:
    method: POST
    endpoint: /post
    headers:
      $val: instance.default-headers
    body:
      orderId: WIDGET-1
      quantity: 3
      tier: standard
      # Cast to a real JSON number so tolerance mode compares it numerically.
      sampleSize: ${SAMPLE_SIZE:int}
  response:
    status: 200
    schema:
      $ref: schema.echo-write
    diff:
      $ref: diff.pricing
    # A POST has no query args, so it carries only the universal HTTP contract.
    assert:
      $ref: assert.http-ok
