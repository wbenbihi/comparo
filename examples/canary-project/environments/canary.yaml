apiVersion: comparo/v1
kind: Environment
metadata:
  name: Canary
  id: environment.canary
  description: >-
    The new release under test — the diff candidate. It is identical to Stable
    except two variables someone changed: TAX_RATE was bumped by accident (the
    regression the Diff screen is meant to catch) and SAMPLE_SIZE grew a few
    counts (an acceptable tweak the ± tolerance profile absorbs).
spec:
  baseUrl: https://postman-echo.com
  timeout:
    connect: 5s
    read: 30s
  secrets:
    BASIC_AUTH:
      from:
        - $env: COMPARO_BASIC_AUTH
        - $literal: cG9zdG1hbjpwYXNzd29yZA==
  variables:
    TAX_RATE: "0.25"
    SAMPLE_SIZE: "1004"
    API_VERSION: "2"
    DEFAULT_LOCALE: en-US
  health:
    - method: GET
      endpoint: /get
