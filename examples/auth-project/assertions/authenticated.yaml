apiVersion: comparo/v1
kind: AssertionProfile
metadata:
  name: Authenticated
  id: assert.authenticated
  description: >-
    The success signal from GET /basic-auth: the body is {authenticated: true}.
    Proves the masked Basic credential reached the server correctly — a wrong or
    missing password answers 401, which the http-ok status rule would catch.
spec:
  rules:
    - target: body:$.authenticated
      op: equals
      value: true
