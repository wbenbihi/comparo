apiVersion: comparo/v1
kind: Request
metadata:
  name: Encoding UTF-8
  id: request.encoding-utf8
  description: >-
    GET /encoding/utf8 — a static, non-JSON HTML document (text/html). With no JSON
    to parse, the differ falls back to a raw-byte comparison; the page is static,
    so it compares SAME.
  tags:
    - encoding
    - smoke
spec:
  request:
    method: GET
    endpoint: /encoding/utf8
    headers:
      $val: instance.default-headers
  response:
    status: 200
