apiVersion: comparo/v1
kind: Request
metadata:
  name: Gzip
  id: request.gzip
  description: >-
    GET /gzip — a gzip-compressed JSON body {gzipped: true, headers, method},
    transparently decoded by the client and compared by shape.
  tags:
    - encoding
    - smoke
spec:
  request:
    method: GET
    endpoint: /gzip
    headers:
      $val: instance.default-headers
  response:
    status: 200
