apiVersion: comparo/v1
kind: Request
metadata:
  name: Time unit
  id: request.time-unit
  description: >-
    GET /time/unit — extracts a single unit from the pinned date; returns
    {unit: 1} for the day of the month. Deterministic, compared exactly.
  tags:
    - time
    - smoke
spec:
  request:
    method: GET
    endpoint: /time/unit
    query:
      timestamp: ${FIXED_TS}
      unit: day
    headers:
      $val: instance.default-headers
  response:
    status: 200
    diff:
      $ref: diff.strict
