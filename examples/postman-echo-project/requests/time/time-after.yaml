apiVersion: comparo/v1
kind: Request
metadata:
  name: Time after
  id: request.time-after
  description: >-
    GET /time/after — is the pinned timestamp after the target? Returns
    {after: false} for 2016-10-10 vs 2018-10-10. Deterministic, compared exactly.
  tags:
    - time
    - smoke
spec:
  request:
    method: GET
    endpoint: /time/after
    query:
      timestamp: ${FIXED_TS}
      target: ${TARGET_TS}
    headers:
      $val: instance.default-headers
  response:
    status: 200
    diff:
      $ref: diff.strict
