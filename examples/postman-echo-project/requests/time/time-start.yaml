apiVersion: comparo/v1
kind: Request
metadata:
  name: Time start-of-unit
  id: request.time-start
  description: >-
    GET /time/start — snaps the pinned date to the start of a unit; returns
    {start: "..."} for the start of the month. Deterministic, compared exactly.
  tags:
    - time
    - smoke
spec:
  request:
    method: GET
    endpoint: /time/start
    query:
      timestamp: ${FIXED_TS}
      unit: month
    headers:
      $val: instance.default-headers
  response:
    status: 200
    diff:
      $ref: diff.strict
