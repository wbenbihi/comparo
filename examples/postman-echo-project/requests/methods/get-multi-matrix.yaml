apiVersion: comparo/v1
kind: Request
metadata:
  name: GET across two matrices
  id: request.get-multi-matrix
  description: >-
    GET /get expanded across two matrices — locales × regions. The cartesian
    product yields six cells (3 locales × 2 regions), each merging its case into
    the query string. Every cell's args echo back and compare exactly.
  tags:
    - methods
    - get
    - matrix
spec:
  matrix:
    - $ref: matrix.locales
    - $ref: matrix.regions
  request:
    method: GET
    endpoint: /get
    query:
      q: catalog
    headers:
      $val: instance.default-headers
  response:
    status: 200
    schema:
      $ref: schema.echo-get
    diff:
      $ref: diff.echo-args
