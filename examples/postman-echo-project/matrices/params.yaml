apiVersion: comparo/v1
kind: Matrix
metadata:
  name: Query params
  id: matrix.params
  description: >-
    Three query-parameter cases merged into request.query. A single request runs
    once per case, so one GET /get definition covers three distinct argument sets.
spec:
  target: request.query
  mode: merge
  values:
    - q: widgets
      page: "1"
    - q: gadgets
      page: "2"
    - q: gizmos
      page: "3"
